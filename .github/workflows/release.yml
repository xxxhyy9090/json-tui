name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            ext: .exe
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            ext: ""
          - target: x86_64-apple-darwin
            os: macos-latest
            ext: ""

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          7z a json-tui-${{ matrix.target }}.zip ./target/${{ matrix.target }}/release/json-tui${{ matrix.ext }} README.md LICENSE

      - name: Package (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          tar -czf json-tui-${{ matrix.target }}.tar.gz -C target/${{ matrix.target }}/release json-tui${{ matrix.ext }} README.md LICENSE

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: json-tui-${{ matrix.target }}
          path: json-tui-${{ matrix.target }}.*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            json-tui-x86_64-pc-windows-msvc/json-tui-x86_64-pc-windows-msvc.zip
            json-tui-x86_64-unknown-linux-gnu/json-tui-x86_64-unknown-linux-gnu.tar.gz
            json-tui-x86_64-apple-darwin/json-tui-x86_64-apple-darwin.tar.gz
          generate_release_notes: true
